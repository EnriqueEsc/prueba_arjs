<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      .capa-ui {
        /* Posicionamiento absoluto para flotar sobre el canvas */
        position: absolute;
        bottom: 30px; /* Lo colocamos en la parte inferior */
        left: 50%;
        transform: translateX(-50%); /* Truco para centrarlo horizontalmente */
        
        /* El z-index alto asegura que nada lo tape */
        z-index: 1000; 
        
        /* Flexbox para alinear el texto y el botón */
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        width: 100%;
      }

      .texto-ar {
        color: white;
        font-family: sans-serif;
        font-size: 18px;
        font-weight: bold;
        /* Una sombra ayuda a que el texto se lea sin importar qué enfoque la cámara */
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); 
      }

      .boton-ar {
        padding: 12px 24px;
        background-color: #ff4757;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      
      .boton-ar:active {
        transform: scale(0.95); /* Pequeño efecto al tocar el botón */
      }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <div class="capa-ui">
      <div class="texto-ar">Apuntando al marcador Hiro</div>
      <button class="boton-ar" id="mi-boton">Haz clic aquí</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker preset="hiro" id="mi-marcador">
        </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script src="app.js"></script>
  </body>
</html>
